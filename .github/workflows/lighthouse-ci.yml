name: Lighthouse CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lighthouse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: pnpm build

      - name: Run Lighthouse CI
        run: pnpm exec lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Post Lighthouse results to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync('.lighthouseci/manifest.json', 'utf8'));

            // Load uploaded report links (URL -> storage URL)
            let links = {};
            try {
              links = JSON.parse(fs.readFileSync('.lighthouseci/links.json', 'utf8'));
            } catch {}

            // Group runs by URL path
            const urlMap = new Map();
            for (const entry of manifest) {
              const url = new URL(entry.url);
              const path = url.pathname === '/' ? '/' : url.pathname;
              if (!urlMap.has(path)) urlMap.set(path, []);
              urlMap.get(path).push(entry);
            }

            const emoji = (score) => {
              if (score >= 0.9) return '🟢';
              if (score >= 0.5) return '🟠';
              return '🔴';
            };
            const pct = (score) => Math.round(score * 100);

            let rows = '';
            for (const [path, entries] of urlMap) {
              // Pick the median run by performance score
              const sorted = entries.sort((a, b) => {
                const sa = JSON.parse(fs.readFileSync(a.jsonPath, 'utf8'));
                const sb = JSON.parse(fs.readFileSync(b.jsonPath, 'utf8'));
                return sa.categories.performance.score - sb.categories.performance.score;
              });
              const entry = sorted[Math.floor(sorted.length / 2)];
              const lhr = JSON.parse(fs.readFileSync(entry.jsonPath, 'utf8'));

              const perf = lhr.categories.performance.score;
              const a11y = lhr.categories.accessibility.score;
              const bp = lhr.categories['best-practices'].score;
              const seo = lhr.categories.seo.score;

              // Find uploaded report URL from links.json
              const reportUrl = links[entry.url] || '';
              const urlCell = reportUrl ? `[${path}](${reportUrl})` : `\`${path}\``;

              rows += `| ${urlCell} | ${emoji(perf)} ${pct(perf)} | ${emoji(a11y)} ${pct(a11y)} | ${emoji(bp)} ${pct(bp)} | ${emoji(seo)} ${pct(seo)} |\n`;
            }

            const runsPerUrl = manifest.length / urlMap.size;
            const body = [
              '### ⚡ Lighthouse Results',
              '',
              '| URL | Performance | Accessibility | Best Practices | SEO |',
              '| --- | :-: | :-: | :-: | :-: |',
              rows.trim(),
              '',
              `_Median of ${runsPerUrl} runs per URL. 🟢 90+ · 🟠 50-89 · 🔴 0-49_`,
            ].join('\n');

            // Update existing comment or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith('### ⚡ Lighthouse Results'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
