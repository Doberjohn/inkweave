name: Lighthouse CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read
  pull-requests: write
  statuses: write
  deployments: read

jobs:
  lighthouse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Wait for Vercel deployment
        id: vercel
        run: |
          SHA="${{ github.event.pull_request.head.sha || github.sha }}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            ENV="Preview"
          else
            ENV="Production"
          fi
          echo "Waiting for Vercel $ENV deployment for $SHA..."

          for i in $(seq 1 30); do
            DEPLOY_ID=$(gh api "repos/${{ github.repository }}/deployments?sha=$SHA&environment=$ENV" \
              --jq '.[0].id // empty' 2>/dev/null || true)

            if [ -n "$DEPLOY_ID" ]; then
              DEPLOY_URL=$(gh api "repos/${{ github.repository }}/deployments/$DEPLOY_ID/statuses" \
                --jq '[.[] | select(.state == "success")][0].environment_url // empty' 2>/dev/null || true)

              if [ -n "$DEPLOY_URL" ]; then
                echo "Deployment ready: $DEPLOY_URL"
                echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
                exit 0
              fi
            fi

            echo "Attempt $i/30 — deployment not ready, waiting 10s..."
            sleep 10
          done

          echo "::error::Timed out waiting for Vercel deployment (5 min)"
          exit 1
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run Lighthouse CI
        id: lhci
        run: |
          pnpm exec lhci autorun 2>&1 | tee /tmp/lhci-output.txt || true
          LHCI_DIR=$(find "$GITHUB_WORKSPACE" -type d -name .lighthouseci | head -1)
          echo "lhci_dir=$LHCI_DIR" >> "$GITHUB_OUTPUT"
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
          LHCI_BASE_URL: ${{ steps.vercel.outputs.url }}

      - name: Post Lighthouse results to PR
        if: github.event_name == 'pull_request' && steps.lhci.outputs.lhci_dir != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const lhciDir = '${{ steps.lhci.outputs.lhci_dir }}';

            // Read all LHR JSON files from .lighthouseci/
            const files = fs.readdirSync(lhciDir).filter(f => f.startsWith('lhr-') && f.endsWith('.json'));
            const runs = files.map(f => JSON.parse(fs.readFileSync(path.join(lhciDir, f), 'utf8')));

            // Parse report URL mapping from LHCI output
            // Format: "Uploading median LHR of http://...success!" then "Open the report at https://..."
            const lhciOutput = fs.readFileSync('/tmp/lhci-output.txt', 'utf8');
            const reportMap = {};
            const re = /Uploading median LHR of (http\S+?)\.{3}[\s\S]*?Open the report at (\S+)/g;
            let m;
            while ((m = re.exec(lhciOutput)) !== null) {
              const p = new URL(m[1]).pathname;
              reportMap[p === '/' ? '/' : p] = m[2];
            }

            // Group runs by URL path
            const urlMap = new Map();
            for (const lhr of runs) {
              const url = new URL(lhr.requestedUrl || lhr.finalUrl);
              const p = url.pathname === '/' ? '/' : url.pathname;
              if (!urlMap.has(p)) urlMap.set(p, []);
              urlMap.get(p).push(lhr);
            }

            const emoji = (score) => {
              if (score >= 0.9) return '🟢';
              if (score >= 0.5) return '🟠';
              return '🔴';
            };
            const pct = (score) => Math.round(score * 100);

            let rows = '';
            for (const [urlPath, lhrs] of urlMap) {
              // Pick median by performance score
              const sorted = lhrs.sort((a, b) =>
                a.categories.performance.score - b.categories.performance.score
              );
              const lhr = sorted[Math.floor(sorted.length / 2)];

              const perf = lhr.categories.performance.score;
              const a11y = lhr.categories.accessibility.score;
              const bp = lhr.categories['best-practices'].score;
              const seo = lhr.categories.seo.score;

              const reportUrl = reportMap[urlPath] || '';
              const urlCell = reportUrl ? `[${urlPath}](${reportUrl})` : `\`${urlPath}\``;

              rows += `| ${urlCell} | ${emoji(perf)} ${pct(perf)} | ${emoji(a11y)} ${pct(a11y)} | ${emoji(bp)} ${pct(bp)} | ${emoji(seo)} ${pct(seo)} |\n`;
            }

            const runsPerUrl = runs.length / urlMap.size;
            const body = [
              '### ⚡ Lighthouse Results',
              '',
              '| URL | Performance | Accessibility | Best Practices | SEO |',
              '| --- | :-: | :-: | :-: | :-: |',
              rows.trim(),
              '',
              `_Median of ${runsPerUrl} runs per URL. 🟢 90+ · 🟠 50-89 · 🔴 0-49_`,
            ].join('\n');

            // Update existing comment or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith('### ⚡ Lighthouse Results'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
