name: Lighthouse CI

on:
  pull_request:
    branches: [master, main]

permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  lighthouse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: pnpm build

      - name: Run Lighthouse CI
        id: lhci
        run: |
          pnpm exec lhci autorun 2>&1 | tee /tmp/lhci-output.txt || true
          LHCI_DIR=$(find "$GITHUB_WORKSPACE" -type d -name .lighthouseci | head -1)
          echo "lhci_dir=$LHCI_DIR" >> "$GITHUB_OUTPUT"
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Post Lighthouse results to PR
        if: github.event_name == 'pull_request' && steps.lhci.outputs.lhci_dir != ''
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const lhciDir = '${{ steps.lhci.outputs.lhci_dir }}';

            // Read all LHR JSON files from .lighthouseci/
            const files = fs.readdirSync(lhciDir).filter(f => f.startsWith('lhr-') && f.endsWith('.json'));
            const runs = files.map(f => JSON.parse(fs.readFileSync(path.join(lhciDir, f), 'utf8')));

            // Parse report URL mapping from LHCI output
            // Format: "Uploading median LHR of http://...success!" then "Open the report at https://..."
            const lhciOutput = fs.readFileSync('/tmp/lhci-output.txt', 'utf8');
            const reportMap = {};
            const re = /Uploading median LHR of (http\S+?)\.{3}[\s\S]*?Open the report at (\S+)/g;
            let match;
            while ((match = re.exec(lhciOutput)) !== null) {
              const p = new URL(match[1]).pathname;
              reportMap[p === '/' ? '/' : p] = match[2];
            }

            // Group runs by URL path
            const urlMap = new Map();
            for (const lhr of runs) {
              const url = new URL(lhr.requestedUrl || lhr.finalUrl);
              const p = url.pathname === '/' ? '/' : url.pathname;
              if (!urlMap.has(p)) urlMap.set(p, []);
              urlMap.get(p).push(lhr);
            }

            // Thresholds from lighthouserc.cjs (error = hard gate, warn = informational)
            const thresholds = {
              'total-blocking-time':      { max: 500,  unit: 'ms',  label: 'TBT',  level: 'error' },
              'largest-contentful-paint':  { max: 3000, unit: 'ms',  label: 'LCP',  level: 'warn'  },
              'cumulative-layout-shift':   { max: 0.1,  unit: '',    label: 'CLS',  level: 'error' },
              'first-contentful-paint':    { max: 2200, unit: 'ms',  label: 'FCP',  level: 'warn'  },
              'speed-index':              { max: 4000, unit: 'ms',  label: 'SI',   level: 'warn'  },
            };
            const metricKeys = Object.keys(thresholds);

            const emoji = (val, t) => {
              if (val <= t.max * 0.75) return '🟢';
              if (val <= t.max) return '🟠';
              return '🔴';
            };
            const fmt = (val, t) => {
              if (t.unit === 'ms') return `${Math.round(val)}${t.unit}`;
              return val.toFixed(3);
            };

            let rows = '';
            for (const [urlPath, lhrs] of urlMap) {
              // Pick median by performance score
              const sorted = lhrs.sort((a, b) =>
                a.categories.performance.score - b.categories.performance.score
              );
              const lhr = sorted[Math.floor(sorted.length / 2)];

              const reportUrl = reportMap[urlPath] || '';
              const urlCell = reportUrl ? `[${urlPath}](${reportUrl})` : `\`${urlPath}\``;

              const cells = metricKeys.map(key => {
                const audit = lhr.audits[key];
                const t = thresholds[key];
                if (!audit || audit.numericValue == null) return '—';
                const val = audit.numericValue;
                return `${emoji(val, t)} ${fmt(val, t)}`;
              });

              rows += `| ${urlCell} | ${cells.join(' | ')} |\n`;
            }

            // Threshold legend row
            const limitCells = metricKeys.map(k => {
              const t = thresholds[k];
              const icon = t.level === 'error' ? '🚫' : '⚠️';
              return `${icon} ${t.unit === 'ms' ? t.max + t.unit : t.max}`;
            });
            const limitRow = `| _Threshold_ | ${limitCells.join(' | ')} |`;

            const headerLabels = metricKeys.map(k => thresholds[k].label);
            const runsPerUrl = runs.length / urlMap.size;
            const body = [
              '### ⚡ Lighthouse Results',
              '',
              `| URL | ${headerLabels.join(' | ')} |`,
              `| --- | ${headerLabels.map(() => ':-:').join(' | ')} |`,
              rows.trim(),
              limitRow,
              '',
              `_Median of ${runsPerUrl} runs. 🟢 ≤75% of limit · 🟠 within limit · 🔴 over limit · 🚫 merge-blocking · ⚠️ warning_`,
            ].join('\n');

            // Update existing comment or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith('### ⚡ Lighthouse Results'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
